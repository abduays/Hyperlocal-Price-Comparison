<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Best Local Service (UK)</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --primary: #111827;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
      }
      h1 { margin: 0 0 8px; font-size: 1.8rem; }
      p { color: var(--muted); margin: 0 0 18px; }
      label { display:block; margin: 12px 0 6px; font-weight: 600; }
      input, select, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        padding: 12px 14px;
        cursor: pointer;
      }
      .hint {
        margin-top: 12px;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .success {
        display:none;
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }
      @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h1>Find the best local service fast</h1>
        <p>Submit once. We compare local providers and message your best option on WhatsApp.</p>

        <form id="request-form">
          <label for="service">Service category</label>
          <select id="service" required>
            <option value="">Choose one</option>
            <option>Plumbing</option>
            <option>Electrical</option>
            <option>Cleaning</option>
            <option>Tutoring</option>
            <option>Appliance repair</option>
          </select>

          <label for="postcode">Postcode</label>
          <input id="postcode" placeholder="e.g. SW1A 1AA" required />

          <div class="row">
            <div>
              <label for="budgetMin">Budget min (£, optional)</label>
              <input id="budgetMin" type="number" min="0" placeholder="80" />
            </div>
            <div>
              <label for="budgetMax">Budget max (£, optional)</label>
              <input id="budgetMax" type="number" min="0" placeholder="150" />
            </div>
          </div>

          <label for="urgency">Urgency</label>
          <select id="urgency" required>
            <option>Immediate (same day)</option>
            <option>Within 24 hours</option>
            <option>Flexible</option>
          </select>

          <label for="contactMethod">Preferred contact method</label>
          <select id="contactMethod" required>
            <option>WhatsApp</option>
            <option>Phone</option>
          </select>

          <label for="phone">WhatsApp / Phone number</label>
          <input id="phone" placeholder="+44..." required />

          <label for="details">Problem description</label>
          <textarea id="details" rows="4" placeholder="Describe what you need" required></textarea>

          <button type="submit">Submit request</button>
          <div class="hint">For production: connect submit handler to your Google Form endpoint.</div>
          <div class="success" id="success-msg"></div>
        </form>
      </div>
    </main>

    <script>
      const form = document.getElementById('request-form');
      const success = document.getElementById('success-msg');

      form.addEventListener('submit', function (event) {
        event.preventDefault();

        const data = {
          service: document.getElementById('service').value,
          postcode: document.getElementById('postcode').value,
          budgetMin: document.getElementById('budgetMin').value,
          budgetMax: document.getElementById('budgetMax').value,
          urgency: document.getElementById('urgency').value,
          contactMethod: document.getElementById('contactMethod').value,
          phone: document.getElementById('phone').value,
          details: document.getElementById('details').value
        };

        const text = [
          'New service request:',
          `Service: ${data.service}`,
          `Postcode: ${data.postcode}`,
          `Budget: £${data.budgetMin || '-'} to £${data.budgetMax || '-'}`,
          `Urgency: ${data.urgency}`,
          `Contact method: ${data.contactMethod}`,
          `Phone: ${data.phone}`,
          `Details: ${data.details}`
        ].join('\n');

        success.style.display = 'block';
        success.textContent = 'Request captured. Next: push this payload to Google Forms and notify via WhatsApp.';
        console.log('Request payload', data);
        console.log('WhatsApp-ready message', text);

        form.reset();
      });
    </script>
  </body>
</html>
